server:
  shutdown_timeout: 15s
  readiness_grace_period: 2s
  upstream_dial_timeout: 5s

observability:
  log_level: info
  json_logs: true
  health_addr: 127.0.0.1:9101
  metrics_path: /metrics

admin:
  enabled: true
  listen_addr: 127.0.0.1:9112
  storage_path: /var/lib/novpn/admin
  catalog_path: /var/lib/novpn/admin/catalog.json
  token: change-me-admin-token
  base_path: /admin
  public_base_url: http://127.0.0.1:9112/admin
  runtime_mode: local
  control_plane_token: change-me-control-plane-token

control_plane:
  enabled: false
  base_url: http://127.0.0.1:9112/admin
  token: change-me-control-plane-token
  listen_addr: 127.0.0.1:9202
  poll_interval: 15s

security:
  auth:
    mode: source_ip_allowlist
    allowed_cidrs:
      - 127.0.0.1/32
      - ::1/128
  acl:
    mode: policy
    allowed_networks:
      - tcp
      - udp
    allowed_upstreams: []

core:
  reality:
    enabled: true
    listen_addr: 127.0.0.1:9443
    public_host: 2.26.85.47
    public_port: 8443
    target: www.cloudflare.com:443
    server_names:
      - www.cloudflare.com
    flow: xtls-rprx-vision
    user_email: reality@novpn
    fingerprint: chrome
    spider_x: /
    sniffing:
      enabled: true
      dest_override:
        - http
        - tls
        - quic
    additional_servers:
      - name: Швейцария (fast)
        public_host: 87.121.105.190
        public_port: 8443
        server_names:
          - www.cloudflare.com
        vpn_only: true
    xray:
      binary_path: /usr/local/bin/xray
      config_path: /usr/local/etc/xray/config.json
      state_path: /var/lib/novpn/reality/state.yaml
      registry_path: /var/lib/novpn/reality/registry.json
      client_profile_path: /var/lib/novpn/reality/client-profile.yaml
      service_name: xray
      install:
        method: official-script
        script_url: https://github.com/XTLS/Xray-install/raw/main/install-release.sh
      log:
        level: warning
        access_path: /var/log/xray/access.log
        error_path: /var/log/xray/error.log

listeners:
  tcp:
    - name: tcp-main
      enabled: true
      listen_addr: 0.0.0.0:8443
      upstream_addr: 127.0.0.1:9443
      timeouts:
        dial: 5s
        idle: 120s
      limits:
        max_connections: 10000
        per_ip_connections: 200

  udp:
    - name: udp-main
      enabled: false
      listen_addr: 0.0.0.0:8443
      upstream_addr: 127.0.0.1:9443
      session:
        idle_ttl: 60s
        cleanup_interval: 15s
        max_sessions: 50000
      limits:
        max_packet_size: 1500
