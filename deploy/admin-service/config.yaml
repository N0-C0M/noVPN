server:
  shutdown_timeout: 15s
  readiness_grace_period: 0s
  upstream_dial_timeout: 5s

observability:
  log_level: info
  json_logs: true
  health_addr: 127.0.0.1:9211
  metrics_path: /metrics

admin:
  enabled: true
  listen_addr: 0.0.0.0:9112
  storage_path: /var/lib/novpn/admin
  catalog_path: /var/lib/novpn/admin/catalog.json
  token: change-me-admin-token
  base_path: /admin
  public_base_url: https://xowery.ru/admin
  runtime_mode: remote
  control_plane_token: change-me-control-plane-token

control_plane:
  enabled: false
  base_url: https://xowery.ru/admin
  token: change-me-control-plane-token
  poll_interval: 15s

security:
  auth:
    mode: source_ip_allowlist
    allowed_cidrs:
      - 127.0.0.1/32
      - ::1/128
  acl:
    mode: policy
    allowed_networks:
      - tcp
      - udp
    allowed_upstreams: []

core:
  reality:
    enabled: true
    listen_addr: 127.0.0.1:9443
    public_host: 87.121.105.190
    public_port: 8443
    target: www.cloudflare.com:443
    server_names:
      - www.cloudflare.com
    flow: xtls-rprx-vision
    user_email: reality@novpn
    fingerprint: chrome
    spider_x: /
    sniffing:
      enabled: true
      dest_override:
        - http
        - tls
        - quic
    xray:
      binary_path: /usr/local/bin/xray
      config_path: /usr/local/etc/xray/config.json
      state_path: /var/lib/novpn/reality/state.yaml
      registry_path: /var/lib/novpn/reality/registry.json
      client_profile_path: /var/lib/novpn/reality/client-profile.yaml
      service_name: xray
      install:
        method: none
      log:
        level: warning
        access_path: /var/log/xray/access.log
        error_path: /var/log/xray/error.log

listeners:
  tcp: []
  udp: []
